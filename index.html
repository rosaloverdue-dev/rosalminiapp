<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Моё мини-приложение ВКонтакте</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .card {
            background: #f5f5f7;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .button {
            background: #0077ff;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }

        .button:active {
            opacity: 0.8;
        }

        .button-secondary {
            background: #e1e3e6;
            color: #000000;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e7e8ec;
        }

        .info-label {
            color: #6c7886;
        }

        .info-value {
            font-weight: 500;
            text-align: right;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e1e3e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
        }

        .greeting {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c7886;
        }

        .error-box {
            background: #ffe8e8;
            border-radius: 12px;
            padding: 20px;
            margin: 20px;
            text-align: center;
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">Загрузка приложения...</div>
    </div>

    <script>
        // Проверяем, запущено ли приложение внутри VK
        const isInsideVK = window.location !== window.parent.location;
        
        // Функция для рендера UI
        function renderUI(userData = null, error = null) {
            const root = document.getElementById('root');
            
            if (error) {
                root.innerHTML = `
                    <div class="error-box">
                        <div style="font-size: 48px; margin-bottom: 12px;">⚠️</div>
                        <div style="font-weight: 600; margin-bottom: 8px;">Ошибка загрузки</div>
                        <div style="font-size: 14px;">${error}</div>
                        <button class="button" onclick="location.reload()" style="margin-top: 16px;">Перезагрузить</button>
                    </div>
                `;
                return;
            }
            
            if (!userData) {
                root.innerHTML = `<div class="loading">⏳ Инициализация VK...</div>`;
                return;
            }
            
            const hour = new Date().getHours();
            let greeting = hour < 12 ? 'Доброе утро' : (hour < 18 ? 'Добрый день' : 'Добрый вечер');
            
            root.innerHTML = `
                <div class="app-container">
                    <div class="greeting">${greeting}, ${userData.first_name || 'Пользователь'}! 👋</div>
                    
                    <div class="card">
                        <div class="card-title">👤 Профиль</div>
                        <div class="profile-section">
                            <div class="profile-avatar">
                                ${(userData.first_name?.[0] || '👤')}
                            </div>
                            <div class="profile-info">
                                <div class="profile-name">${userData.first_name || ''} ${userData.last_name || ''}</div>
                                <div style="font-size: 13px; color: #6c7886;">ID: ${userData.id || 'Неизвестно'}</div>
                            </div>
                        </div>
                        ${userData.city ? `<div class="info-row">
                            <span class="info-label">🏙️ Город</span>
                            <span class="info-value">${userData.city.title || 'Не указан'}</span>
                        </div>` : ''}
                    </div>
                    
                    <div class="card">
                        <div class="card-title">⚡ Действия</div>
                        <button class="button" id="alertBtn">Показать уведомление</button>
                        <button class="button button-secondary" id="shareBtn">Поделиться</button>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">ℹ️ О приложении</div>
                        <div class="info-row">
                            <span class="info-label">Режим</span>
                            <span class="info-value">VK Mini App</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Статус</span>
                            <span class="info-value">✅ Активно</span>
                        </div>
                    </div>
                </div>
            `;
            
            // Добавляем обработчики
            document.getElementById('alertBtn')?.addEventListener('click', () => {
                if (window.vkBridge) {
                    window.vkBridge.send('VKWebAppShowNotification', {
                        text: 'Привет из мини-приложения!',
                        title: 'Уведомление'
                    }).catch(() => alert('Уведомление: Привет из мини-приложения!'));
                } else {
                    alert('Уведомление: Привет из мини-приложения!');
                }
            });
            
            document.getElementById('shareBtn')?.addEventListener('click', () => {
                if (window.vkBridge) {
                    window.vkBridge.send('VKWebAppShare', {
                        link: window.location.href,
                        title: 'Моё мини-приложение'
                    }).catch(() => alert('Поделиться не удалось'));
                } else {
                    alert('Функция доступна только внутри VK');
                }
            });
        }
        
        // Основная инициализация
        async function init() {
            console.log('Инициализация приложения...');
            
            // Загружаем VK Bridge
            const script = document.createElement('script');
            script.src = 'https://vk.com/js/api/openapi.js';
            script.onload = () => {
                console.log('VK API загружен');
                startApp();
            };
            script.onerror = () => {
                console.error('Ошибка загрузки VK API');
                renderUI(null, 'Не удалось загрузить VK API. Проверьте подключение к интернету.');
            };
            document.head.appendChild(script);
        }
        
        async function startApp() {
            try {
                // Ждём загрузку bridge
                if (!window.vkBridge && !window.VK) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                
                // Пробуем получить данные пользователя через VK Bridge
                let userInfo = null;
                
                // Способ 1: через VK Apps метод
                if (window.VK && window.VK.WebApp) {
                    try {
                        userInfo = await window.VK.WebApp.getUserInfo();
                        console.log('User info получены через VK.WebApp:', userInfo);
                    } catch(e) {
                        console.log('Ошибка VK.WebApp.getUserInfo:', e);
                    }
                }
                
                // Способ 2: через параметры URL (передаются VK)
                if (!userInfo) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const vkUserId = urlParams.get('vk_user_id');
                    
                    if (vkUserId) {
                        userInfo = {
                            id: parseInt(vkUserId),
                            first_name: 'Пользователь',
                            last_name: '',
                            city: { title: 'Не указан' }
                        };
                        console.log('User info из URL params:', userInfo);
                    }
                }
                
                // Способ 3: тестовые данные
                if (!userInfo) {
                    userInfo = {
                        id: 1,
                        first_name: 'Тестовый',
                        last_name: 'Пользователь',
                        city: { title: 'Тестовый город' }
                    };
                    console.log('Используем тестовые данные');
                }
                
                renderUI(userInfo);
                
                // Устанавливаем bridge если доступен
                if (window.vkBridge) {
                    window.vkBridge.send('VKWebAppInit', {});
                }
                
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                renderUI(null, 'Не удалось запустить приложение. Попробуйте перезагрузить страницу.');
            }
        }
        
        // Запускаем инициализацию
        init();
    </script>
</body>
</html>
