<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VK Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .card {
            background: #f5f5f7;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .button {
            background: #0077ff;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
        }

        .button-secondary {
            background: #e1e3e6;
            color: #000000;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e7e8ec;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e1e3e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
        }

        .greeting {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c7886;
        }

        .status-badge {
            display: inline-block;
            background: #4bb34b;
            color: white;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            margin-left: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: #6c7886;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">📱 Загрузка приложения...</div>
    </div>

    <script>
        // Ждём полной загрузки страницы
        document.addEventListener('DOMContentLoaded', function() {
            startApp();
        });

        async function startApp() {
            const root = document.getElementById('root');
            
            // Получаем параметры из URL (передаются VK)
            const urlParams = new URLSearchParams(window.location.search);
            const vkUserId = urlParams.get('vk_user_id');
            const vkAppId = urlParams.get('vk_app_id');
            const vkPlatform = urlParams.get('vk_platform');
            
            // Проверяем, есть ли vkBridge
            const hasBridge = typeof window.vkBridge !== 'undefined';
            
            // ===== ВАЖНО: Отправляем сигнал загрузки в VK =====
            if (hasBridge) {
                try {
                    // Отправляем сигнал инициализации
                    await window.vkBridge.send('VKWebAppInit', {});
                    console.log('✅ VKWebAppInit отправлен');
                    
                    // Отправляем сигнал завершения загрузки
                    await window.vkBridge.send('VKWebAppLoadingCompleted', {});
                    console.log('✅ VKWebAppLoadingCompleted отправлен');
                } catch(e) {
                    console.log('Bridge сигнал не отправлен:', e);
                }
            }
            
            // Если параметры от VK есть, используем их
            let userInfo = {
                id: vkUserId ? parseInt(vkUserId) : null,
                first_name: 'Пользователь',
                last_name: '',
                platform: vkPlatform || 'unknown'
            };
            
            // Если есть bridge, пробуем получить полные данные пользователя
            if (hasBridge && userInfo.id) {
                try {
                    const fullUserInfo = await window.vkBridge.send('VKWebAppGetUserInfo');
                    if (fullUserInfo && fullUserInfo.first_name) {
                        userInfo.first_name = fullUserInfo.first_name;
                        userInfo.last_name = fullUserInfo.last_name || '';
                        if (fullUserInfo.photo_100) userInfo.photo = fullUserInfo.photo_100;
                        if (fullUserInfo.city) userInfo.city = fullUserInfo.city;
                    }
                } catch(e) {
                    console.log('Не удалось получить полную информацию пользователя');
                }
            }
            
            // Если нет bridge и нет ID из URL, показываем ошибку
            const isInVK = hasBridge || (vkUserId && vkUserId !== '0');
            
            if (!isInVK) {
                root.innerHTML = `
                    <div class="container">
                        <div class="card" style="text-align: center;">
                            <div style="font-size: 48px; margin-bottom: 16px;">⚠️</div>
                            <div class="card-title">Приложение должно открываться внутри VK</div>
                            <div style="color: #6c7886; margin-bottom: 20px;">
                                Пожалуйста, откройте это приложение через официальное приложение VK или веб-версию VK.
                            </div>
                            <div class="info-row">
                                <span class="info-label">Статус</span>
                                <span class="info-value">Вне VK</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">App ID из URL</span>
                                <span class="info-value">${vkAppId || 'не передан'}</span>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            // Рендерим приложение с данными пользователя
            const hour = new Date().getHours();
            let greeting = hour < 12 ? 'Доброе утро' : (hour < 18 ? 'Добрый день' : 'Добрый вечер');
            const displayName = userInfo.first_name;
            const initial = displayName.charAt(0).toUpperCase();
            
            root.innerHTML = `
                <div class="container">
                    <div class="greeting">
                        ${greeting}, ${displayName}! 👋
                        <span class="status-badge">VK</span>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">👤 Профиль</div>
                        <div class="profile-section">
                            <div class="profile-avatar">${initial}</div>
                            <div class="profile-info">
                                <div class="profile-name">${displayName} ${userInfo.last_name || ''}</div>
                                <div style="font-size: 13px; color: #6c7886;">ID: ${userInfo.id || '—'}</div>
                            </div>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📱 Платформа</span>
                            <span class="info-value">${userInfo.platform || 'VK Mobile'}</span>
                        </div>
                        ${userInfo.city ? `<div class="info-row">
                            <span class="info-label">🏙️ Город</span>
                            <span class="info-value">${userInfo.city.title || '—'}</span>
                        </div>` : ''}
                    </div>
                    
                    <div class="card">
                        <div class="card-title">⚡ Действия</div>
                        <button class="button" id="notifyBtn">🔔 Показать уведомление</button>
                        <button class="button button-secondary" id="shareBtn">📤 Поделиться</button>
                        <button class="button button-secondary" id="closeBtn">❌ Закрыть приложение</button>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">ℹ️ О приложении</div>
                        <div class="info-row">
                            <span class="info-label">🔗 Статус</span>
                            <span class="info-value">✅ Загружено</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">🌐 Режим</span>
                            <span class="info-value">VK Mini App</span>
                        </div>
                    </div>
                    
                    <div class="footer">
                        ✨ Работает внутри VK
                    </div>
                </div>
            `;
            
            // Добавляем обработчики кнопок
            document.getElementById('notifyBtn')?.addEventListener('click', async () => {
                if (hasBridge) {
                    try {
                        await window.vkBridge.send('VKWebAppShowNotification', {
                            text: 'Привет из мини-приложения! 👋',
                            title: 'Уведомление'
                        });
                    } catch(e) {
                        alert('Уведомление: Привет из VK!');
                    }
                } else {
                    alert('Привет из VK Mini App!');
                }
            });
            
            document.getElementById('shareBtn')?.addEventListener('click', async () => {
                if (hasBridge) {
                    try {
                        await window.vkBridge.send('VKWebAppShare', {
                            link: window.location.href,
                            title: 'Моё мини-приложение'
                        });
                    } catch(e) {
                        alert('Не удалось поделиться');
                    }
                } else {
                    alert('Функция доступна внутри VK');
                }
            });
            
            document.getElementById('closeBtn')?.addEventListener('click', async () => {
                if (hasBridge) {
                    try {
                        await window.vkBridge.send('VKWebAppClose', { status: 'success' });
                    } catch(e) {
                        // ignore
                    }
                }
            });
        }
    </script>
</body>
</html>
